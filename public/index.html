<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>! million checkboxes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #111133 40%, #1a0a2e 70%, #0d0d1f 100%);
            color: #e2e8f0;
            padding: 2rem 1rem 3rem;
            overflow-x: hidden;
        }

        /* ── Animated background particles ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(2px 2px at 20% 30%, rgba(139, 92, 246, 0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(59, 130, 246, 0.25), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(236, 72, 153, 0.2), transparent),
                radial-gradient(2px 2px at 80% 60%, rgba(16, 185, 129, 0.25), transparent),
                radial-gradient(1.5px 1.5px at 10% 80%, rgba(139, 92, 246, 0.2), transparent),
                radial-gradient(1.5px 1.5px at 70% 90%, rgba(59, 130, 246, 0.2), transparent),
                radial-gradient(1.5px 1.5px at 90% 10%, rgba(236, 72, 153, 0.15), transparent);
            animation: twinkle 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0%   { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ── Heading ── */
        h1 {
            position: relative;
            z-index: 1;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a78bfa, #818cf8, #60a5fa, #34d399);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease-in-out infinite;
            margin-bottom: 2rem;
            text-align: center;
            text-transform: uppercase;
        }

        h1::after {
            content: '';
            display: block;
            width: 60%;
            height: 3px;
            margin: 0.75rem auto 0;
            border-radius: 2px;
            background: linear-gradient(90deg, transparent, #818cf8, #60a5fa, #818cf8, transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.4; transform: scaleX(0.8); }
            50%      { opacity: 1;   transform: scaleX(1); }
        }

        /* ── Container (glass card) ── */
        #container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
            gap: 10px;
            max-width: 680px;
            width: 100%;
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 0 60px rgba(139, 92, 246, 0.03);
        }

        /* ── Custom Checkboxes ── */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 32px;
            height: 32px;
            border: 2px solid rgba(139, 92, 246, 0.35);
            border-radius: 8px;
            background: rgba(15, 15, 35, 0.6);
            cursor: pointer;
            position: relative;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input[type="checkbox"]:hover {
            border-color: rgba(139, 92, 246, 0.7);
            background: rgba(139, 92, 246, 0.08);
            transform: scale(1.12);
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.25);
        }

        input[type="checkbox"]:focus-visible {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.3);
        }

        /* Checkmark */
        input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 45%;
            left: 50%;
            width: 7px;
            height: 13px;
            border: solid transparent;
            border-width: 0 2.5px 2.5px 0;
            transform: translate(-50%, -50%) rotate(45deg) scale(0);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #7c3aed, #6366f1, #3b82f6);
            border-color: transparent;
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:
                0 0 12px rgba(99, 102, 241, 0.5),
                0 0 24px rgba(99, 102, 241, 0.2);
        }

        input[type="checkbox"]:checked::after {
            border-color: #fff;
            transform: translate(-50%, -50%) rotate(45deg) scale(1);
        }

        @keyframes popIn {
            0%   { transform: scale(0.85); }
            50%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            #container {
                gap: 8px;
                padding: 1.25rem;
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            input[type="checkbox"] {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>
    <h1>checkboxes</h1>
    <div id = "container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>

        const socket = io();
       const container = document.getElementById('container');
       const  CHECKBOX_COUNT = 200


       // here i handle server side event 
       socket.on('server:checkbox:change', (data) => {
        console.log('server:checkbox:change', data);
        const {index, checked} = data;


        // this is for the DOM manipulation on client side
        // what ever is changed in server show that in ui 
        const input = document.getElementById(`checkbox${index}`);
        if(input) {
            input.checked = checked;
        }
       })

       new Array(CHECKBOX_COUNT).fill(null).forEach((_, index) => {
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.id = `checkbox${index}`;


        input.addEventListener('change', event => {
            const checked = event.target.checked;   
            console.log('checkbox changed', {index, checked});
            socket.emit('client:checkbox:change', {index, checked});    
        })


        
        container.appendChild(input);
       })
    </script>
</body>
</html>
